<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Story Bible</title>
<style>
:root{
  --ink:#14110d; --panel:#1b1712; --panel2:#211c15; --line:#332c21;
  --text:#e9e1d0; --dim:#9a8f7a; --faint:#6b6355;
  --brass:#d0a04b; --brass-dim:#8a6b34; --seal:#c05b35;
  --outline:#6b6355; --draft:#c9a35a; --revised:#93a878; --final:#d0a04b;
  --serif:"Iowan Old Style","Palatino Nova",Palatino,"Book Antiqua",Georgia,serif;
  --display:"Hoefler Text","Big Caslon","Iowan Old Style",Georgia,serif;
  --mono:ui-monospace,"SF Mono",Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{
  min-height:100%;background:var(--ink);color:var(--text);
  font-family:var(--serif);font-size:16px;line-height:1.5;
  background-image:radial-gradient(ellipse 1200px 600px at 20% -10%,rgba(208,160,75,.05),transparent),
                   radial-gradient(ellipse 900px 500px at 110% 110%,rgba(192,91,53,.04),transparent);
}
::selection{background:rgba(208,160,75,.28)}
a{color:var(--brass);text-decoration:none}
button{font-family:var(--mono);cursor:pointer}

/* ---------- login ---------- */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--ink);z-index:50}
#login .card{width:min(400px,90vw);text-align:center;padding:3rem 2.4rem;border:1px solid var(--line);
  background:linear-gradient(180deg,var(--panel2),var(--panel));animation:rise .6s ease both}
#login h1{font-family:var(--display);font-weight:400;font-size:2rem;letter-spacing:.35em;text-transform:uppercase;color:var(--text)}
#login .rule{width:56px;height:1px;background:var(--brass);margin:1.1rem auto 1.4rem}
#login p{color:var(--dim);font-style:italic;margin-bottom:1.6rem;font-size:.95rem}
#login input{width:100%;padding:.7rem .9rem;background:var(--ink);border:1px solid var(--line);color:var(--text);
  font-family:var(--mono);font-size:.85rem;letter-spacing:.03em}
#login input:focus{outline:none;border-color:var(--brass-dim)}
#login button{margin-top:1rem;width:100%;padding:.7rem;background:var(--brass);border:none;color:#181307;
  font-size:.8rem;letter-spacing:.25em;text-transform:uppercase}
#login button:hover{background:#e0b566}
#login .err{color:var(--seal);font-size:.85rem;margin-top:.9rem;min-height:1.2em}

/* ---------- shell ---------- */
#app{display:none;min-height:100vh}
#app.on{display:grid;grid-template-columns:250px 1fr;grid-template-rows:auto 1fr}
header{grid-column:1/3;display:flex;align-items:baseline;gap:1.2rem;padding:.9rem 1.4rem;
  border-bottom:1px solid var(--line);background:rgba(20,17,13,.9)}
header .mark{font-family:var(--display);letter-spacing:.3em;text-transform:uppercase;font-size:.8rem;color:var(--brass)}
header .proj{font-family:var(--display);font-size:1.05rem}
header .words{margin-left:auto;font-family:var(--mono);font-size:.72rem;color:var(--dim)}
header .btn{background:none;border:1px solid var(--line);color:var(--dim);font-size:.68rem;
  padding:.3rem .7rem;letter-spacing:.12em;text-transform:uppercase}
header .btn:hover{border-color:var(--brass-dim);color:var(--text)}

nav{border-right:1px solid var(--line);padding:1.4rem 0;background:var(--panel)}
nav .sect{font-family:var(--mono);font-size:.62rem;letter-spacing:.28em;text-transform:uppercase;
  color:var(--faint);padding:.9rem 1.4rem .4rem}
nav .item{display:flex;justify-content:space-between;align-items:center;padding:.42rem 1.4rem;color:var(--dim);
  cursor:pointer;border-left:2px solid transparent;font-size:.92rem}
nav .item:hover{color:var(--text)}
nav .item.on{color:var(--text);border-left-color:var(--brass);background:rgba(208,160,75,.06)}
nav .item .n{font-family:var(--mono);font-size:.68rem;color:var(--faint)}
nav .item .n.hot{color:var(--seal)}

main{padding:2.4rem 3rem 5rem;max-width:78ch;width:100%;justify-self:center;animation:fade .35s ease both}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ---------- lists ---------- */
.crumb{font-family:var(--mono);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:1.6rem}
.crumb a{color:var(--dim)} .crumb a:hover{color:var(--brass)}
h2.viewtitle{font-family:var(--display);font-weight:400;font-size:1.7rem;margin-bottom:1.8rem}
.row{display:flex;align-items:baseline;gap:1rem;padding:.85rem .2rem;border-bottom:1px solid var(--line);
  cursor:pointer;animation:fade .4s ease both}
.row:hover{background:rgba(208,160,75,.04)}
.row .no{font-family:var(--mono);font-size:.7rem;color:var(--faint);width:2.2rem;flex:none}
.row .t{font-family:var(--display);font-size:1.08rem;flex:1}
.row .m{font-family:var(--mono);font-size:.68rem;color:var(--dim);flex:none}
.chip{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;
  padding:.14rem .5rem;border:1px solid var(--line);border-radius:2px;flex:none}
.chip.outline{color:var(--outline)} .chip.draft{color:var(--draft)}
.chip.revised{color:var(--revised)} .chip.final{color:var(--final);border-color:var(--brass-dim)}
.chip.pending{color:var(--seal);border-color:var(--seal)}
.chip.blocking{color:#e06a45;border-color:#e06a45} .chip.major{color:var(--draft)}
.chip.minor{color:var(--dim)} .chip.watch{color:var(--faint)}
.chip.pass{color:var(--revised)} .chip.revise{color:var(--draft)}
.chip.stale{color:var(--faint);border-style:dashed}
.evq{border-left:2px solid var(--brass-dim);padding:.5rem .9rem;font-style:italic;
  color:var(--text);margin:.5rem 0;background:rgba(208,160,75,.05);font-size:.95rem}
.fnd{border:1px solid var(--line);padding:1rem 1.1rem;margin:.7rem 0;animation:fade .4s ease both}
.fnd .fhead{display:flex;gap:.6rem;align-items:baseline;margin-bottom:.4rem}
.fnd .cat{font-family:var(--mono);font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
.fnd .expl{font-size:.92rem;color:var(--dim);line-height:1.6}
.fnd .fix{font-size:.88rem;color:var(--text);margin-top:.5rem}
.fnd .fix b{font-family:var(--mono);font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--brass)}
.deskhead{font-family:var(--mono);font-size:.64rem;letter-spacing:.24em;text-transform:uppercase;color:var(--brass);margin:2.2rem 0 .8rem}
.notecard{border-left:2px solid var(--line);padding:.6rem 1rem;margin:.6rem 0}
.notecard .who{font-family:var(--mono);font-size:.68rem;color:var(--brass)}
.notecard .anch{font-family:var(--mono);font-size:.7rem;color:var(--faint);font-style:italic;margin:.2rem 0}
.notecard .nbody{font-size:.92rem;color:var(--dim);line-height:1.55}

/* ---------- editorial ink ---------- */
u.ann{text-decoration:none;border-bottom:3px solid;padding-bottom:1px;cursor:pointer;border-radius:2px 2px 0 0}
.annpop{position:absolute;z-index:60;width:min(440px,86vw);background:var(--panel2);
  border:1px solid var(--brass-dim);padding:1rem 1.2rem;box-shadow:0 12px 40px rgba(0,0,0,.6);
  animation:fade .18s ease both}
.annpop .aphead{display:flex;gap:.6rem;align-items:baseline;margin-bottom:.5rem;flex-wrap:wrap}
.annpop .apwho{font-family:var(--mono);font-size:.68rem;color:var(--brass)}
.annpop .apbody{font-size:.9rem;color:var(--text);line-height:1.55}
.annpop .apfix{font-size:.85rem;color:var(--dim);margin-top:.5rem}
.annpop .apfix b{font-family:var(--mono);font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--brass)}
.annpop .apreb{border-left:2px solid var(--seal);padding:.3rem .7rem;margin-top:.6rem;
  font-size:.85rem;color:var(--dim);font-style:italic}
.annpop .apreb b{font-family:var(--mono);font-size:.64rem;font-style:normal;color:var(--seal)}
.ann-strong{color:#b9e08f;border-color:#8fc060;background:rgba(150,190,110,.12)}
.ann-weak{color:#ff9068;border-color:#ff6a3c;background:rgba(224,90,50,.14)}
.ann-mid{color:#ffd27f;border-color:#e0a94e;background:rgba(216,170,90,.13)}
u.ann strong,u.ann em{color:inherit}
.inklegend{display:flex;gap:1.1rem;justify-content:center;font-family:var(--mono);
  font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin:.6rem 0 1.4rem}
.inklegend span{border-bottom:2px solid;padding-bottom:1px}
.inklegend .lg{border-color:#8fc060;color:#b9e08f}
.inklegend .lr{border-color:#ff6a3c;color:#ff9068}
.inklegend .ly{border-color:#e0a94e;color:#ffd27f}

/* ---------- reading ---------- */
.prose{font-size:1.06rem;line-height:1.85;color:var(--text)}
.prose p{margin:0 0 1.1em;text-align:justify;hyphens:auto}
.prose p+p{text-indent:1.6em;margin-top:-1.1em;padding-top:1.1em}
.prose h1,.prose h2,.prose h3{font-family:var(--display);font-weight:400;margin:1.6em 0 .7em;line-height:1.3}
.prose blockquote{border-left:2px solid var(--brass-dim);padding-left:1.1em;color:var(--dim);font-style:italic;margin:0 0 1.1em}
.prose ul{margin:0 0 1.1em 1.4em}
.asterism{text-align:center;color:var(--brass);letter-spacing:.6em;margin:1.8em 0;font-size:1.05rem}
.chaptertitle{font-family:var(--display);font-weight:400;font-size:2rem;text-align:center;margin:1rem 0 .4rem}
.chapterrule{width:64px;height:1px;background:var(--brass);margin:1rem auto 2.4rem}
.scenehead{display:flex;gap:.6rem;align-items:baseline;margin:2.2rem 0 .8rem;opacity:.85}
.scenehead .st{font-family:var(--mono);font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;color:var(--faint)}
.empty{color:var(--faint);font-style:italic;padding:2rem 0}

/* ---------- sheets / cards ---------- */
.lede{font-style:italic;color:var(--dim);font-size:1.05rem;margin-bottom:1.6rem}
.kv{width:100%;border-collapse:collapse;margin:1.4rem 0;font-size:.88rem}
.kv td{padding:.4rem .6rem;border-bottom:1px solid var(--line)}
.kv td:first-child{font-family:var(--mono);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);width:11rem}
.cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:.8rem}
.card{border:1px solid var(--line);background:var(--panel);padding:1rem 1.1rem;cursor:pointer;animation:fade .4s ease both}
.card:hover{border-color:var(--brass-dim)}
.card .t{font-family:var(--display);font-size:1.02rem;margin-bottom:.3rem}
.card .s{color:var(--dim);font-size:.82rem;line-height:1.45;font-style:italic}
.blockhead{font-family:var(--mono);font-size:.64rem;letter-spacing:.24em;text-transform:uppercase;color:var(--faint);margin:2rem 0 .8rem}
.propblock{border:1px solid var(--line);margin-bottom:1.6rem;animation:fade .4s ease both}
.propblock .phead{display:flex;gap:.9rem;align-items:baseline;padding:.7rem 1rem;background:var(--panel);border-bottom:1px solid var(--line)}
.propblock .phead .who{font-family:var(--mono);font-size:.72rem;color:var(--brass)}
.propblock .body{padding:1.1rem 1.2rem}
.propblock .lbl{font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);margin:.8rem 0 .4rem}
.propblock .txt{font-size:.95rem;line-height:1.7;color:var(--dim);max-height:14em;overflow:auto;padding-right:.5rem}
.propblock .txt.new{color:var(--text)}
.statnum{font-family:var(--display);font-size:3.4rem;line-height:1;color:var(--brass)}
.statlbl{font-family:var(--mono);font-size:.64rem;letter-spacing:.24em;text-transform:uppercase;color:var(--faint);margin:.4rem 0 2rem}
.bar{display:flex;align-items:center;gap:.8rem;margin:.45rem 0;animation:fade .5s ease both}
.bar .bl{width:14rem;flex:none;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar .bt{flex:1;height:8px;background:var(--panel2);position:relative}
.bar .bf{position:absolute;inset:0 auto 0 0;background:linear-gradient(90deg,var(--brass-dim),var(--brass))}
.bar .bn{font-family:var(--mono);font-size:.68rem;color:var(--dim);width:4.5rem;text-align:right;flex:none}
.loading{color:var(--faint);font-family:var(--mono);font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;padding:3rem 0;text-align:center}

/* ---------- canon editing ---------- */
.editbar{display:flex;gap:.6rem;margin:1.2rem 0}
.btn2{background:none;border:1px solid var(--line);color:var(--dim);font-family:var(--mono);
  font-size:.66rem;padding:.35rem .8rem;letter-spacing:.14em;text-transform:uppercase;cursor:pointer}
.btn2:hover{border-color:var(--brass-dim);color:var(--text)}
.btn2.primary{background:var(--brass);border-color:var(--brass);color:#181307}
.btn2.primary:hover{background:#e0b566}
input.edit,textarea.edit{width:100%;background:var(--panel2);border:1px solid var(--line);
  color:var(--text);font-family:var(--serif);font-size:1rem;line-height:1.6;padding:.8rem;margin:.35rem 0}
input.edit:focus,textarea.edit:focus{outline:none;border-color:var(--brass-dim)}
textarea.edit{min-height:14rem;resize:vertical}
.editerr{color:var(--seal);font-size:.85rem;margin:.6rem 0;white-space:pre-wrap}
</style>
</head>
<body>

<div id="login">
  <div class="card">
    <h1>Story Bible</h1>
    <div class="rule"></div>
    <p>the one source of truth</p>
    <input id="keyin" type="password" placeholder="API key" autocomplete="off"
           onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Open the book</button>
    <div class="err" id="loginerr"></div>
  </div>
</div>

<div id="app">
  <header>
    <span class="mark">Story Bible</span>
    <span class="proj" id="projname"></span>
    <span class="words" id="projwords"></span>
    <button class="btn" onclick="refresh()">Refresh</button>
    <button class="btn" onclick="logout()">Lock</button>
  </header>
  <nav id="nav"></nav>
  <main id="main"><div class="loading">Opening…</div></main>
</div>

<script>
"use strict";
let KEY = localStorage.getItem("sb_key") || "";
let PROJECT = null, PROJECTS = [], VIEW = {name:"desk"}, KINDCOUNTS = {};
let INK = localStorage.getItem("sb_ink") !== "off";

let ANN = [];
function inkMark(text, anns){
  let items = [];
  (anns.strengths||[]).forEach(s=>items.push({q:s.evidence_quote, cls:"ann-strong",
    label:"PROTECT", chip:"final", who:s.by, model:s.model,
    body:s.explanation, fix:"", status:"", rebuttals:[]}));
  (anns.findings||[]).forEach(f=>items.push({q:f.evidence_quote,
    cls:(f.severity==="blocking"||f.severity==="major")?"ann-weak":"ann-mid",
    label:f.severity.toUpperCase()+" · "+f.category, chip:f.severity,
    who:f.by, model:f.model, body:f.explanation,
    fix:f.smallest_intervention||"", status:f.status, rebuttals:f.rebuttals||[]}));
  items = items.filter(it=>it.q && it.q.trim().length>3);
  items.sort((a,b)=>b.q.length-a.q.length);
  function find(t, q){
    let idx = t.indexOf(q);
    if(idx>=0) return {idx, len:q.length};
    // whitespace-flexible fallback: survives paragraph breaks + normalization drift
    const pat = q.trim().split(/\s+/)
      .map(w=>w.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")).join("[\\s]+");
    try{const m = t.match(new RegExp(pat)); if(m) return {idx:m.index, len:m[0].length};}
    catch(e){}
    return null;
  }
  const marks = [];
  for(const it of items){
    const f = find(text, it.q);
    if(!f) continue;
    // a quote spanning paragraph breaks gets inked per paragraph chunk
    const span = text.slice(f.idx, f.idx+f.len);
    const chunks = span.split(/\n{2,}/).filter(c=>c.trim().length>10);
    let cursor = f.idx;
    for(const chunk of chunks){
      const ci = text.indexOf(chunk, cursor);
      if(ci<0) continue;
      const n = ANN.length;
      text = text.slice(0,ci)+`⟦S${n}⟧`+chunk+`⟦E${n}⟧`+text.slice(ci+chunk.length);
      cursor = ci + chunk.length + 10;
      ANN.push(it); marks.push(n);
    }
  }
  return {text, marks};
}
function inkApply(html, marks){
  for(const n of marks){
    const it = ANN[n];
    html = html.split(`⟦S${n}⟧`).join(
      `<u class="ann ${it.cls}" onclick="annPop(event,${n})">`)
      .split(`⟦E${n}⟧`).join("</u>");
  }
  return html.replace(/⟦[SE]\d+⟧/g,"");
}
function annPop(ev, n){
  ev.stopPropagation();
  document.querySelectorAll(".annpop").forEach(x=>x.remove());
  const it = ANN[n]; if(!it) return;
  const who = it.who ? `${it.who} · ${it.model||""}` : "";
  let h = `<div class="aphead"><span class="chip ${it.chip}">${esc(it.label)}</span>
    <span class="apwho">${esc(who)}</span>
    ${it.status?`<span class="chip" style="margin-left:auto">${esc(it.status)}</span>`:""}</div>
    <div class="apbody">${esc(it.body)}</div>`;
  if(it.fix) h += `<div class="apfix"><b>Smallest fix</b> ${esc(it.fix)}</div>`;
  for(const r of it.rebuttals||[])
    h += `<div class="apreb"><b>${esc(r.created_by)} dissents:</b> ${esc(r.body)}</div>`;
  const pop = document.createElement("div");
  pop.className = "annpop"; pop.innerHTML = h;
  pop.onclick = e=>e.stopPropagation();
  document.body.appendChild(pop);
  const x = Math.min(ev.pageX, window.scrollX + window.innerWidth - pop.offsetWidth - 20);
  pop.style.left = Math.max(10, x) + "px";
  pop.style.top = (ev.pageY + 14) + "px";
}
document.addEventListener("click", ()=>document.querySelectorAll(".annpop").forEach(x=>x.remove()));

async function api(name, args){
  const r = await fetch("/mcp", {method:"POST",
    headers:{"X-API-Key":KEY,"Content-Type":"application/json",
             "Accept":"application/json, text/event-stream"},
    body:JSON.stringify({jsonrpc:"2.0",id:Date.now(),method:"tools/call",
                         params:{name, arguments:args||{}}})});
  if(r.status===401){logout();throw new Error("bad key")}
  const j = await r.json();
  if(j.error) throw new Error(j.error.message||"server error");
  const res = j.result||{};
  if(res.isError) throw new Error((res.content||[]).map(c=>c.text).join(" "));
  const sc = res.structuredContent;
  if(sc!==undefined && sc!==null) return (typeof sc==="object" && "result" in sc)? sc.result : sc;
  return JSON.parse((res.content||[]).map(c=>c.text).join(""));
}

function esc(s){return (s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function md(src){
  if(!src||!src.trim()) return "<div class='empty'>Nothing written here yet.</div>";
  const out=[];
  for(const blk of src.split(/\n{2,}/)){
    const b=blk.trim(); if(!b) continue;
    if(/^(\*\s?){3,}$|^(\* ){2,}\*$|^\*\*\*$/.test(b)){out.push("<div class='asterism'>⁂</div>");continue}
    let h=b.match(/^(#{1,3})\s+(.*)$/s);
    if(h){out.push(`<h${h[1].length+1}>${inline(h[2])}</h${h[1].length+1}>`);continue}
    if(b.startsWith(">")){out.push(`<blockquote>${inline(b.replace(/^>\s?/gm,""))}</blockquote>`);continue}
    if(/^[-*]\s/m.test(b)&&b.split("\n").every(l=>/^[-*]\s/.test(l))){
      out.push("<ul>"+b.split("\n").map(l=>`<li>${inline(l.replace(/^[-*]\s/,""))}</li>`).join("")+"</ul>");continue}
    out.push(`<p>${inline(b).replace(/\n/g,"<br>")}</p>`);
  }
  return out.join("");
}
function inline(s){
  return esc(s).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
               .replace(/(^|[^*])\*([^*\n]+)\*/g,"$1<em>$2</em>");
}
function words(chars){return chars? "~"+(Math.round(chars/6/10)*10).toLocaleString()+" w":""}
function when(iso){if(!iso)return"";const d=new Date(iso);
  return d.toLocaleDateString([],{month:"short",day:"numeric"})+" "+d.toLocaleTimeString([],{hour:"numeric",minute:"2-digit"})}
function stagger(){document.querySelectorAll("main .row, main .card, main .bar, main .propblock")
  .forEach((el,i)=>el.style.animationDelay=Math.min(i*35,420)+"ms")}

/* ---------- auth ---------- */
async function doLogin(){
  KEY=document.getElementById("keyin").value.trim();
  try{ await boot(); localStorage.setItem("sb_key",KEY); }
  catch(e){ document.getElementById("loginerr").textContent="That key didn't open it."; }
}
function logout(){localStorage.removeItem("sb_key");KEY="";
  document.getElementById("app").classList.remove("on");
  document.getElementById("login").style.display="flex";}

async function boot(){
  PROJECTS = await api("project_list");
  document.getElementById("login").style.display="none";
  document.getElementById("app").classList.add("on");
  PROJECT = PROJECTS[0]||null;
  await refresh();
}

async function refresh(){
  PROJECTS = await api("project_list");
  if(PROJECT && !PROJECTS.some(p=>p.id===PROJECT.id)) PROJECT = PROJECTS[0]||null;
  if(!PROJECT) PROJECT = PROJECTS[0]||null;
  if(!PROJECT){main("<div class='empty'>No projects yet. The first chapter is waiting to happen.</div>");return}
  const [proj, pending] = await Promise.all([
    api("project_get",{project_id:PROJECT.id}),
    api("proposal_list",{status:"pending"})
  ]);
  KINDCOUNTS = proj.entity_counts||{};
  document.getElementById("projname").textContent = proj.name;
  drawNav(proj, pending.length);
  render();
}

/* ---------- nav ---------- */
const KINDS=["character","faction","location","arc","narrative","thread","event","lore","item","theme","research","style","note"];
function drawNav(proj, pendingN){
  let h = "<div class='sect'>Book</div>";
  h += navItem("desk","The Desk","");
  h += navItem("manuscript","Manuscript", proj.chapter_count||"");
  h += navItem("reviews","Reviews","");
  h += navItem("history","History","");
  h += navItem("proposals","Proposals", pendingN, pendingN>0);
  h += navItem("stats","The Ledger","");
  h += "<div class='sect'>Bible</div>";
  for(const k of KINDS){ if(KINDCOUNTS[k]) h += navItem("kind:"+k, k.charAt(0).toUpperCase()+k.slice(1)+"s", KINDCOUNTS[k]); }
  if(PROJECTS.length>1){
    h += "<div class='sect'>Projects</div>";
    for(const p of PROJECTS) h += `<div class="item ${PROJECT.id===p.id?'on':''}" onclick="switchProject('${p.id}')"><span>${esc(p.name)}</span></div>`;
  }
  document.getElementById("nav").innerHTML=h;
}
function navItem(id,label,n,hot){
  const on = VIEW.name===id || (VIEW.name.startsWith("kind:")&&VIEW.name===id);
  return `<div class="item ${on?'on':''}" onclick="go('${id}')"><span>${label}</span><span class="n ${hot?'hot':''}">${n||""}</span></div>`;
}
async function switchProject(id){PROJECT=PROJECTS.find(p=>p.id===id);VIEW={name:"manuscript"};await refresh()}
function go(v){VIEW={name:v};render();refresh_nav_state()}
function refresh_nav_state(){/* nav re-highlights on next refresh; cheap immediate: */
  document.querySelectorAll("nav .item").forEach(el=>el.classList.remove("on"));}
function main(html){document.getElementById("main").innerHTML=html;stagger()}

/* ---------- views ---------- */
async function render(){
  main("<div class='loading'>Turning pages…</div>");
  try{
    if(VIEW.name==="desk") await vDesk();
    else if(VIEW.name==="manuscript") await vManuscript();
    else if(VIEW.name==="chapter") await vChapter(VIEW.id);
    else if(VIEW.name==="reviews") await vReviews();
    else if(VIEW.name==="history") await vHistory();
    else if(VIEW.name==="run") await vRun(VIEW.id);
    else if(VIEW.name==="proposals") await vProposals();
    else if(VIEW.name==="stats") await vStats();
    else if(VIEW.name.startsWith("kind:")) await vKind(VIEW.name.slice(5));
    else if(VIEW.name==="entity") await vEntity(VIEW.id);
  }catch(e){main(`<div class='empty'>Couldn't load: ${esc(e.message)}</div>`)}
}

async function vDesk(){
  const d = await api("project_dashboard_get",{project_id:PROJECT.id});
  let h="<h2 class='viewtitle'>The Desk</h2>";
  if(d.what_changed.length){h+="<div class='deskhead'>What changed</div>";
    for(const c of d.what_changed) h+=`<div class="row" style="cursor:default">
      <span class="no">r${c.rev}</span><span class="t" style="font-size:.98rem">${esc(c.what)}</span>
      <span class="m">${when(c.at)} · ${esc(c.by)}${c.note?" · "+esc(c.note):""}</span></div>`;}
  if(d.protect.length){h+="<div class='deskhead'>Working — protect these</div>";
    for(const p of d.protect) h+=`<div class="evq">"${esc(p.evidence_quote)}"<div style="font-style:normal;color:var(--dim);font-size:.85rem;margin-top:.3rem">${esc(p.explanation)}</div></div>`;}
  if(d.blocking_major_findings.length){h+="<div class='deskhead'>Blocking & major findings</div>";
    for(const f of d.blocking_major_findings) h+=`<div class="fnd">
      <div class="fhead"><span class="chip ${f.severity}">${f.severity}</span><span class="cat">${esc(f.category)}</span></div>
      <div class="evq">"${esc(f.evidence_quote.slice(0,160))}${f.evidence_quote.length>160?"…":""}"</div>
      <div class="fix"><b>Smallest fix</b> ${esc(f.smallest_intervention)}</div></div>`;}
  for(const g of (d.latest_gates||[])){
    h+=`<div class='deskhead'>Latest gate — ${esc(g.model)} · ${esc(g.analysis_type.replace(/_/g," "))} · rev ${g.target_rev}
      <span class="chip ${esc(g.verdict)}" style="margin-left:.6rem">${esc(g.verdict)}</span>
      ${g.stale?'<span class="chip stale">stale — chapter has moved</span>':""}</div>`;
    const gk=Object.keys(g.scores), gmx=Math.max(1,...gk.map(k=>g.scores[k]));
    const gs=gmx<=10?10:1;
    for(const k of gk)
      h+=`<div class="bar"><span class="bl">${esc(k.replace(/_/g," "))}</span>
        <span class="bt"><span class="bf" style="width:${Math.min(100,g.scores[k]*gs)}%"></span></span>
        <span class="bn">${g.scores[k]}${gs===10?"/10":""}</span></div>`;
    h+=`<div class="editbar"><button class="btn2" onclick="VIEW={name:'run',id:'${g.run_id}'};render()">Full report</button></div>`;
  }
  h+="<div class='deskhead'>Awaiting your ruling</div>";
  const aw=d.awaiting_owner;
  h+=`<div class="row" onclick="go('proposals')"><span class="no">${aw.pending_proposals.length}</span>
      <span class="t" style="font-size:.95rem">pending proposals</span></div>`;
  h+=`<div class="row" style="cursor:default"><span class="no">${aw.open_blocking}</span>
      <span class="t" style="font-size:.95rem">open blocking/major findings</span></div>`;
  if(d.reviews_waiting.length){h+="<div class='deskhead'>Reviews in flight</div>";
    for(const r of d.reviews_waiting) h+=`<div class="row" onclick="go('reviews')">
      <span class="no">${r.status==="running"?"…":"Q"}</span>
      <span class="t" style="font-size:.95rem">${esc(r.analysis_type)}</span>
      <span class="m">${esc(r.created_at.slice(11,16))}</span></div>`;}
  const db=d.debt;
  h+="<div class='deskhead'>The promises ledger</div>";
  h+=`<table class="kv">
    <tr><td>open threads</td><td>${db.open_threads.length}</td></tr>
    <tr><td>claims needing attention</td><td>${db.claims_needing_attention.length}</td></tr>
    <tr><td>watch items</td><td>${db.watch_items.length}</td></tr>
    <tr><td>stale analyses</td><td>${db.stale_analyses}</td></tr></table>`;
  if(d.seam && d.seam.last_verified)
    h+=`<div class="statlbl" style="margin-top:1.4rem">seam · reality through: ${esc(d.seam.last_verified.slice(0,80))}</div>`;
  main(h);
}

async function vHistory(){
  const items = await api("project_history_get",{project_id:PROJECT.id});
  let h="<h2 class='viewtitle'>History</h2><div class='statlbl'>everything fixed, ruled, verified, and revised — nothing here is ever deleted</div>";
  if(!items.length){main(h+"<div class='empty'>The record awaits its first entry.</div>");return}
  let day="";
  for(const it of items){
    const d=new Date(it.at).toLocaleDateString([],{weekday:"short",month:"short",day:"numeric"});
    if(d!==day){day=d;h+=`<div class="deskhead">${d}</div>`}
    const kc = it.kind==="revision"?"final":it.kind.startsWith("finding")?"revised":
               it.kind==="decision"?"pending":it.kind.startsWith("fact")?"revised":"outline";
    h+=`<div class="notecard"><div class="who">
        ${new Date(it.at).toLocaleTimeString([],{hour:"numeric",minute:"2-digit"})}
        · <span class="chip ${kc}">${esc(it.kind)}</span> · ${esc(it.who||"")}</div>
        <div class="nbody" style="color:var(--text)">${esc(it.what)}</div>
        ${it.detail?`<div class="nbody">${esc(it.detail)}</div>`:""}</div>`;
  }
  main(h);
}

async function vReviews(){
  const runs = await api("analysis_run_list",{project_id:PROJECT.id});
  let h="<h2 class='viewtitle'>Reviews</h2>";
  if(!runs.length){main(h+"<div class='empty'>No analysis runs yet. Queue one and Sol takes the chair.</div>");return}
  for(const r of runs) h+=`<div class="row" onclick="VIEW={name:'run',id:'${r.id}'};render()">
    <span class="no">r${r.target_rev}</span>
    <span class="t" style="font-size:1rem">${esc(r.analysis_type)}</span>
    <span class="m">${esc(r.model)}</span>
    ${r.stale?'<span class="chip stale">stale</span>':""}
    <span class="chip ${r.status==="complete"?(r.verdict||"pass"):"pending"}">${r.status==="complete"?esc(r.verdict):r.status}</span></div>`;
  main(h);
}

async function vRun(id){
  const r = await api("analysis_run_get",{run_id:id});
  let h=`<div class="crumb"><a onclick="go('reviews')">Reviews</a> / ${esc(r.analysis_type)}
    <span class="chip ${r.verdict||'pending'}" style="margin-left:.8rem">${esc(r.verdict||r.status)}</span>
    ${r.stale?'<span class="chip stale">stale — target has moved</span>':""}</div>`;
  h+=`<div class="chaptertitle" style="text-align:left;font-size:1.5rem">${esc(r.analysis_type)} · rev ${r.target_rev}</div>`;
  h+=`<div class="statlbl">${esc(r.model)} · ${esc(r.reasoning_effort)} reasoning · ${esc((r.completed_at||"").slice(0,16))}</div>`;
  if(r.intent_summary) h+=`<div class="blockhead">Intended</div><div class="lede">${esc(r.intent_summary)}</div>`;
  if(r.observed_summary) h+=`<div class="blockhead">Observed</div><div class="lede">${esc(r.observed_summary)}</div>`;
  const sk=Object.keys(r.scores||{});
  if(sk.length){h+="<div class='blockhead'>Scores</div>";
    const mx=Math.max(...sk.map(k=>r.scores[k]));
    const scale=mx<=10?10:1;  // one historical run scored in tens; bars normalize, numbers stay honest
    for(const k of sk) h+=`<div class="bar"><span class="bl">${esc(k.replace(/_/g," "))}</span>
      <span class="bt"><span class="bf" style="width:${Math.min(100,r.scores[k]*scale)}%"></span></span>
      <span class="bn">${r.scores[k]}${scale===10?"/10":""}</span></div>`;}
  if(r.strengths.length){h+="<div class='blockhead'>Strengths to protect</div>";
    for(const s of r.strengths) h+=`<div class="evq">"${esc(s.evidence_quote)}"<div style="font-style:normal;color:var(--dim);font-size:.85rem;margin-top:.3rem">${esc(s.explanation)}</div></div>`;}
  if(r.findings.length){h+="<div class='blockhead'>Findings</div>";
    for(const f of r.findings) h+=`<div class="fnd">
      <div class="fhead"><span class="chip ${f.severity}">${f.severity}</span>
        <span class="cat">${esc(f.category)} · conf ${f.confidence}</span>
        <span class="chip" style="margin-left:auto">${esc(f.status)}</span></div>
      <div class="evq">"${esc(f.evidence_quote)}"</div>
      <div class="expl">${esc(f.explanation)}</div>
      <div class="fix"><b>Smallest fix</b> ${esc(f.smallest_intervention)}</div></div>`;}
  if((r.limitations||[]).length){h+="<div class='blockhead'>Limitations Sol declared</div>";
    for(const l of r.limitations) h+=`<div class="notecard"><div class="nbody">${esc(l)}</div></div>`;}
  main(h);
}

async function vManuscript(){
  const chs = await api("chapter_list",{project_id:PROJECT.id});
  let total=0; chs.forEach(c=>total+=c.content_chars||0);
  document.getElementById("projwords").textContent = words(total);
  if(!chs.length){main("<h2 class='viewtitle'>Manuscript</h2><div class='empty'>No chapters yet.</div>");return}
  let h="<h2 class='viewtitle'>Manuscript</h2>";
  chs.forEach((c,i)=>{
    h+=`<div class="row" onclick="VIEW={name:'chapter',id:'${c.id}'};render()">
      <span class="no">${String(i+1).padStart(2,"0")}</span>
      <span class="t">${esc(c.title)}</span>
      <span class="m">r${c.rev} · ${when(c.updated_at)} · ${words(c.content_chars)}</span>
      <span class="chip ${c.status}">${c.status}</span></div>`;
  });
  main(h);
}

async function vChapter(id){
  const ch = await api("chapter_get",{chapter_id:id});
  let h=`<div class="crumb"><a onclick="go('manuscript')">Manuscript</a> / ${esc(ch.title)}
         <span class="chip ${ch.status}" style="margin-left:.8rem">${ch.status}</span>
         <button class="btn2" style="margin-left:1rem" onclick="INK=!INK;localStorage.setItem('sb_ink',INK?'on':'off');render()">${INK?"ink on":"ink off"}</button></div>`;
  h+=`<div class="chaptertitle">${esc(ch.title)}</div>
      <div class="statlbl" style="text-align:center;margin-bottom:0">rev ${ch.rev} · updated ${when(ch.updated_at)} · ${esc(ch.status)}</div>
      <div class="chapterrule"></div>`;
  ANN = [];
  if(INK) h+=`<div class="inklegend"><span class="lg">strong</span><span class="ly">mediocre</span><span class="lr">weak</span> <span style="border:none">· click any mark for the note & who made the call</span></div>`;
  function inked(text, anns){
    if(!INK || !anns) return md(text);
    const {text:marked, marks} = inkMark(text, anns);
    return inkApply(md(marked), marks);
  }
  if(ch.scenes && ch.scenes.length){
    const scenes = await Promise.all(ch.scenes.map(s=>api("scene_get",{scene_id:s.id})));
    const sanns = INK ? await Promise.all(scenes.map(s=>api("annotations_get",{target_type:"scene",target_id:s.id}).catch(()=>null))) : [];
    scenes.forEach((s,i)=>{
      h+=`<div class="scenehead"><span class="st">${esc(s.title)||"scene"}</span>
          <span class="chip ${s.status}">${s.status}</span></div>`;
      if(s.synopsis) h+=`<div class="lede">${esc(s.synopsis)}</div>`;
      h+=`<div class="prose">${inked(s.content_md, sanns[i])}</div>`;
      if(i<scenes.length-1) h+="<div class='asterism'>⁂</div>";
    });
  } else {
    const anns = INK ? await api("annotations_get",{target_type:"chapter",target_id:id}).catch(()=>null) : null;
    h+=`<div class="prose">${inked(ch.content_md, anns)}</div>`;
  }
  const notes = await api("comment_list",{target_type:"chapter",target_id:id,status:"open"});
  if(notes.length){
    h+="<div class='blockhead'>Margin notes ("+notes.length+" open)</div>";
    for(const n of notes) h+=`<div class="notecard"><div class="who">${esc(n.created_by)}</div>
      ${n.anchor_quote?`<div class="anch">on: "${esc(n.anchor_quote.slice(0,90))}"</div>`:""}
      <div class="nbody">${esc(n.body)}</div></div>`;
  }
  main(h);
}

async function vKind(kind){
  const ents = await api("entity_list",{project_id:PROJECT.id, kind});
  let h=`<h2 class="viewtitle">${kind.charAt(0).toUpperCase()+kind.slice(1)}s</h2>`;
  h+=`<div class="editbar"><button class="btn2" onclick="newEntity('${kind}')">+ New ${esc(kind)}</button></div><div id="editzone"></div>`;
  if(!ents.length){main(h+"<div class='empty'>None yet.</div>");return}
  h+="<div class='cardgrid'>";
  for(const e of ents) h+=`<div class="card" onclick="VIEW={name:'entity',id:'${e.id}',back:'kind:${kind}'};render()">
    <div class="t">${esc(e.name)}</div><div class="s">${esc(e.summary)||"&nbsp;"}</div></div>`;
  main(h+"</div>");
}

function newEntity(kind){
  document.getElementById("editzone").innerHTML = `
    <input class="edit" id="n_name" placeholder="name">
    <input class="edit" id="n_sum" placeholder="summary (one line)">
    <textarea class="edit" id="n_body" placeholder="content (markdown)"></textarea>
    <div class="editbar"><button class="btn2 primary" onclick="createEntity('${kind}')">Create</button>
    <button class="btn2" onclick="render()">Cancel</button></div><div class="editerr" id="n_err"></div>`;
  document.getElementById("n_name").focus();
}
async function createEntity(kind){
  try{
    const name = document.getElementById("n_name").value.trim();
    if(!name){document.getElementById("n_err").textContent="It needs a name.";return}
    await api("entity_create",{project_id:PROJECT.id, kind, name,
      summary:document.getElementById("n_sum").value,
      content_md:document.getElementById("n_body").value});
    await refresh();
  }catch(err){document.getElementById("n_err").textContent = err.message}
}

async function vEntity(id){
  const e = await api("entity_get",{entity_id:id});
  const [meta, apps] = await Promise.all([
    api("meta_get",{target_type:"entity",target_id:id}),
    api("entity_appearances",{entity_id:id}).catch(()=>[])
  ]);
  let h=`<div class="crumb"><a onclick="go('${VIEW.back||('kind:'+e.kind)}')">${e.kind}s</a> / ${esc(e.name)}</div>`;
  h+=`<div class="chaptertitle" style="text-align:left">${esc(e.name)}</div>`;
  h+=`<div class="statlbl" style="margin-bottom:1rem">rev ${e.rev} · updated ${when(e.updated_at)} · by ${esc(e.created_by)}</div>`;
  if(e.summary) h+=`<div class="lede">${esc(e.summary)}</div>`;
  h+=`<div class="prose">${md(e.content_md)}</div>`;
  const mk = Object.keys(meta);
  if(mk.length){h+="<div class='blockhead'>Metadata</div><table class='kv'>";
    for(const k of mk) h+=`<tr><td>${esc(k)}</td><td>${esc(meta[k])}</td></tr>`; h+="</table>";}
  if(apps.length){h+="<div class='blockhead'>Appears in</div>";
    for(const a of apps) h+=`<div class="row" ${a.target_type!=="entity"?`onclick="openApp('${a.target_type}','${a.target_id}')"`:""}>
      <span class="no">${a.count}×</span><span class="t" style="font-size:.95rem">${esc(a.title||a.target_id)}</span>
      <span class="m">${a.target_type}</span></div>`;}
  h+=`<div class="editbar"><button class="btn2" onclick="editEntity('${id}')">Edit</button></div><div id="editzone"></div>`;
  main(h);
}

async function editEntity(id){
  const e = await api("entity_get",{entity_id:id});
  document.getElementById("editzone").innerHTML = `
    <div class="blockhead">Editing — every save is a new attributed revision; locked records will refuse</div>
    <input class="edit" id="e_sum" placeholder="summary" value="${esc(e.summary||"")}">
    <textarea class="edit" id="e_body">${esc(e.content_md||"")}</textarea>
    <div class="editbar"><button class="btn2 primary" onclick="saveEntity('${id}')">Save revision</button>
    <button class="btn2" onclick="render()">Cancel</button></div><div class="editerr" id="e_err"></div>`;
}
async function saveEntity(id){
  try{
    await api("entity_update",{entity_id:id,
      summary:document.getElementById("e_sum").value,
      content_md:document.getElementById("e_body").value,
      revision_note:"edited in the web room"});
    render();
  }catch(err){document.getElementById("e_err").textContent = err.message}
}
async function openApp(tt,id){
  if(tt==="chapter"){VIEW={name:"chapter",id};render()}
  else if(tt==="scene"){const s=await api("scene_get",{scene_id:id});VIEW={name:"chapter",id:s.chapter_id};render()}
}

async function vProposals(){
  const props = await api("proposal_list",{status:"pending"});
  let h="<h2 class='viewtitle'>Pending Proposals</h2>";
  if(!props.length){main(h+"<div class='empty'>Nothing awaits judgment. The editors are quiet.</div>");return}
  for(const p of props){
    const full = await api("proposal_get",{proposal_id:p.id});
    h+=`<div class="propblock">
      <div class="phead"><span class="who">${esc(p.created_by)}</span>
        <span class="m" style="font-family:var(--mono);font-size:.66rem;color:var(--faint)">
          ${esc(p.target_type)} · base rev ${p.base_rev}${p.stale?" · ":""}</span>
        ${p.stale?'<span class="chip pending">stale</span>':""}
        <span style="margin-left:auto;font-size:.85rem;font-style:italic;color:var(--dim)">${esc(p.rationale)}</span></div>
      <div class="body">
        <div class="lbl">Proposed</div><div class="txt new">${md(full.proposed_content_md)}</div>
        <div class="lbl">Current (rev ${full.current_rev})</div><div class="txt">${md(full.current_content_md)}</div>
      </div></div>`;
  }
  main(h+"<div class='empty' style='font-size:.85rem'>Decisions happen through author keys — this window only watches.</div>");
}

async function vStats(){
  const s = await api("project_stats",{project_id:PROJECT.id});
  let h="<h2 class='viewtitle'>The Ledger</h2>";
  h+=`<div class="statnum">${s.total_words.toLocaleString()}</div><div class="statlbl">words in the manuscript</div>`;
  if(s.target){h+=`<div class="blockhead">Target</div>
    <div class="bar"><span class="bl">${s.target.target_words.toLocaleString()} words</span>
    <span class="bt"><span class="bf" style="width:${Math.min(100,s.target.pct_complete)}%"></span></span>
    <span class="bn">${s.target.pct_complete}%</span></div>`;
    if(s.target.days_left!==undefined) h+=`<div class="statlbl" style="margin-top:.6rem">${s.target.days_left} days left${s.target.words_per_day_needed?` · ${s.target.words_per_day_needed.toLocaleString()} words/day to make it`:""}</div>`;}
  const maxw = Math.max(1,...s.chapters.map(c=>c.words));
  if(s.chapters.length){h+="<div class='blockhead'>Chapters</div>";
    for(const c of s.chapters) h+=`<div class="bar"><span class="bl">${esc(c.title)}</span>
      <span class="bt"><span class="bf" style="width:${Math.round(100*c.words/maxw)}%"></span></span>
      <span class="bn">${c.words.toLocaleString()}</span></div>`;}
  if(s.pov_distribution.length){h+="<div class='blockhead'>Points of View</div>";
    const maxp=Math.max(...s.pov_distribution.map(p=>p.n));
    for(const p of s.pov_distribution) h+=`<div class="bar"><span class="bl">${esc(p.pov)}</span>
      <span class="bt"><span class="bf" style="width:${Math.round(100*p.n/maxp)}%"></span></span>
      <span class="bn">${p.n} scenes</span></div>`;}
  if(s.top_mentions.length){h+="<div class='blockhead'>Most Present</div>";
    for(const m of s.top_mentions) h+=`<div class="bar"><span class="bl">${esc(m.name)} <span style="color:var(--faint);font-size:.75rem">(${m.kind})</span></span>
      <span class="bn" style="width:auto">${m.total} mentions</span></div>`;}
  h+=`<div class="blockhead">Open</div><table class="kv">
    <tr><td>comments</td><td>${s.open_comments}</td></tr>
    <tr><td>proposals</td><td>${s.pending_proposals}</td></tr></table>`;
  main(h);
}

/* ---------- start ---------- */
if(KEY){boot().catch(()=>logout())}
</script>
</body>
